<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121611" />
    <title>Forest Gate Defense</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.addEventListener(
        "error",
        (event) => {
          if (event.target && event.target.tagName === "SCRIPT" && event.target.src.endsWith("/sdk.js")) {
            event.preventDefault();
            window.__YANDEX_SDK_LOAD_FAILED__ = true;
          }
        },
        true
      );
    </script>
    <script src="/sdk.js"></script>
  </head>
  <body>
    <main id="game-root" aria-label="Forest Gate Defense game">
      <canvas id="gameCanvas"></canvas>
      <div id="fallback-message" role="status">Loading game...</div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
